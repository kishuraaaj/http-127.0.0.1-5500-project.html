<!DOCTYPE html>
<html lang="en">
  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone</title>
    <link rel="stylesheet" href="project.css">
</head>
<body>

    <header>
        <div class="logo">🎮 GameZone</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Games</a></li>
                <li><a href="#">News</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to GameZone</h1>
        <p>Your Ultimate Gaming Destination</p>
        <button>Guess Number</button>
    </section>

    <section class="games">
        <h2>Featured Games</h2>

        <div class="game-container">
            <div class="card">
                <img src="https://www.shutterstock.com/image-vector/doodle-vector-set-featuring-video-260nw-2425886111.jpg" alt="Game 1">
                <h3>Drawing</h3>
                <p>Action-packed multiplayer game.</p>
            </div>

            <div class="card">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/047/553/018/small/sport-racing-car-fast-driving-to-achieve-the-champion-dream-motion-blur-and-lighting-effect-photo.jpg" alt="Game 2">
                <h3>Speed Racer</h3>
                <p>Ultimate racing experience.</p>
            </div>

            <div class="card">
                <img src="https://wave-cms-uploads.s3.amazonaws.com/large_gaming_tips_80e58b7501.jpg" alt="Game 3">
                <h3>Space Adventure</h3>
                <p>Explore the universe and beyond.</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 GameZone. All Rights Reserved.</p>
    </footer>

</body>
</html>
